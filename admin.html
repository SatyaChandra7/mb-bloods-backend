<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MB Bloods | Admin Dashboard</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 min-h-screen" x-data="adminApp()">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-black text-red-600 tracking-wider uppercase">MB Bloods Admin</h1>
        </div>
        <button x-show="isAuthenticated" @click="logout()" class="px-4 py-2 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 font-semibold transition-colors text-sm">
            Logout
        </button>
    </header>

    <main class="container mx-auto px-4 py-8">
        
        <!-- Login Screen -->
        <div x-show="!isAuthenticated" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-2xl shadow-xl border border-gray-100" x-cloak>
            <h2 class="text-3xl font-bold mb-6 text-center text-gray-800">Admin Login</h2>
            
            <div x-show="loginError" class="mb-6 p-4 bg-red-50 text-red-600 rounded-xl text-sm font-semibold text-center" x-text="loginError"></div>
            
            <form @submit.prevent="login()" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
                    <input type="text" x-model="credentials.username" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                    <input type="password" x-model="credentials.password" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 focus:outline-none">
                </div>
                <button type="submit" class="w-full bg-red-600 text-white font-bold py-3 rounded-xl hover:bg-red-700 transition-colors shadow-lg hover:shadow-red-200 mt-4 disabled:opacity-50" :disabled="isLoading">
                    <span x-show="!isLoading">Login to Dashboard</span>
                    <span x-show="isLoading">Authenticating...</span>
                </button>
            </form>
        </div>

        <!-- Dashboard Screen -->
        <div x-show="isAuthenticated" class="space-y-6" x-cloak>
            
            <!-- Filters Section -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col md:flex-row gap-4 items-end">
                <div class="w-full md:w-1/3">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Filter by Blood Group</label>
                    <select x-model="filters.bloodGroup" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 focus:outline-none">
                        <option value="All">All Blood Groups</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                </div>
                
                <div class="w-full md:w-1/3">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Search by Address</label>
                    <input type="text" x-model="filters.address" placeholder="State, District, Mandal, or Village..." @keydown.enter="fetchDonors()"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 focus:outline-none">
                </div>
                
                <div class="w-full md:w-1/3">
                    <button @click="fetchDonors()" class="w-full px-6 py-3 bg-gray-900 text-white font-bold rounded-xl hover:bg-black transition-colors shadow-lg flex items-center justify-center gap-2 disabled:opacity-50" :disabled="isLoading">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        Search / Apply Filters
                    </button>
                </div>
            </div>

            <!-- Empty State / Welcome -->
            <div x-show="donors.length === 0 && !hasSearched && !isLoading" class="bg-white rounded-2xl p-16 shadow-sm border border-gray-100 text-center">
                <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4 text-red-600">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
                </div>
                <h3 class="text-xl font-bold text-gray-800">Apply filters to view donors</h3>
                <p class="text-gray-500 mt-2">Select a blood group or enter a location to load donor lists.</p>
            </div>

            <!-- Loading State -->
            <div x-show="isLoading && isAuthenticated" class="text-center py-12">
                <svg class="animate-spin h-10 w-10 text-red-600 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg>
            </div>

            <!-- Data Table -->
            <div x-show="hasSearched && !isLoading" class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden" x-cloak>
                <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                    <h3 class="font-bold text-gray-800 uppercase tracking-widest text-sm">Donor Results</h3>
                    <span class="text-xs font-bold bg-white text-gray-600 px-3 py-1 rounded-full border border-gray-200" x-text="`${donors.length} Found`"></span>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left whitespace-nowrap">
                        <thead class="bg-gray-50 border-b border-gray-100 text-xs uppercase text-gray-500 font-bold tracking-wider">
                            <tr>
                                <th class="px-6 py-4">Name</th>
                                <th class="px-6 py-4">Blood Group</th>
                                <th class="px-6 py-4">Phone</th>
                                <th class="px-6 py-4">Address (Mandal, Dist, State)</th>
                                <th class="px-6 py-4">Registration Date</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-50 text-sm">
                            <template x-for="donor in donors" :key="donor._id">
                                <tr class="hover:bg-red-50/30 transition-colors">
                                    <td class="px-6 py-4 font-semibold text-gray-900" x-text="donor.fullName"></td>
                                    <td class="px-6 py-4">
                                        <span class="px-3 py-1 rounded-full text-xs font-bold" 
                                              :class="donor.bloodGroup.includes('-') ? 'bg-gray-100 text-gray-700' : 'bg-red-100 text-red-700'"
                                              x-text="donor.bloodGroup">
                                        </span>
                                    </td>
                                    <td class="px-6 py-4 text-gray-600 font-medium" x-text="donor.phoneNumber"></td>
                                    <td class="px-6 py-4 text-gray-600">
                                        <span x-text="`${donor.address.village ? donor.address.village+', ' : ''}${donor.address.mandal ? donor.address.mandal+', ' : ''}${donor.address.district}, ${donor.address.state}`"></span>
                                    </td>
                                    <td class="px-6 py-4 text-gray-500" x-text="new Date(donor.registeredAt).toLocaleDateString()"></td>
                                </tr>
                            </template>
                            <tr x-show="donors.length === 0">
                                <td colspan="5" class="px-6 py-12 text-center text-gray-500">No donors match your current filters.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('adminApp', () => ({
                isAuthenticated: false,
                token: localStorage.getItem('adminToken') || null,
                isLoading: false,
                loginError: '',
                hasSearched: false,
                credentials: {
                    username: '',
                    password: ''
                },
                filters: {
                    bloodGroup: 'All',
                    address: ''
                },
                donors: [],
                
                get apiBase() {
                    return (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:') ? 'http://localhost:5000' : '';
                },

                init() {
                    if (this.token) {
                        this.isAuthenticated = true;
                    }
                },

                async login() {
                    this.isLoading = true;
                    this.loginError = '';
                    try {
                        const res = await fetch(`${this.apiBase}/api/admin/login`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.credentials)
                        });
                        const data = await res.json();
                        
                        if (data.success) {
                            this.token = data.token;
                            localStorage.setItem('adminToken', data.token);
                            this.isAuthenticated = true;
                            this.credentials = { username: '', password: '' };
                        } else {
                            this.loginError = data.message || 'Login failed';
                        }
                    } catch (err) {
                        this.loginError = 'Server connection error. Ensure backend is running.';
                    } finally {
                        this.isLoading = false;
                    }
                },

                logout() {
                    this.token = null;
                    localStorage.removeItem('adminToken');
                    this.isAuthenticated = false;
                    this.donors = [];
                    this.hasSearched = false;
                },

                async fetchDonors() {
                    if (!this.isAuthenticated) return;
                    this.isLoading = true;
                    
                    try {
                        const params = new URLSearchParams();
                        if (this.filters.bloodGroup !== 'All') params.append('bloodGroup', this.filters.bloodGroup);
                        if (this.filters.address.trim() !== '') params.append('address', this.filters.address);
                        
                        const res = await fetch(`${this.apiBase}/api/admin/donors?${params.toString()}`, {
                            headers: {
                                'Authorization': `Bearer ${this.token}`
                            }
                        });
                        
                        if (res.status === 401 || res.status === 403) {
                            this.logout();
                            this.loginError = 'Session expired. Please login again.';
                            return;
                        }

                        const data = await res.json();
                        if (data.success) {
                            this.donors = data.donors;
                            this.hasSearched = true;
                        } else {
                            alert(data.message || 'Failed to fetch donors');
                        }
                    } catch (err) {
                        alert('Error connecting to Server');
                    } finally {
                        this.isLoading = false;
                    }
                }
            }));
        });
    </script>
</body>
</html>
